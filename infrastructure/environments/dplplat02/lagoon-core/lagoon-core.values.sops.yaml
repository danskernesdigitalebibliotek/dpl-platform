        tag: ""
    service:
        type: ClusterIP
        ports:
            epmd: 4369
            amqp: 5672
            amqps: 5671
            http: 15672
            metrics: 15692
        amqpExternal:
            # amqpExternal is used to enable or disable the port on the external facing service.
