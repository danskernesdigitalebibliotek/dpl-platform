            enabled: false
            type: LoadBalancer
            port: 5672
            annotations: {}
            # externalTrafficPolicy: ""
            # loadBalancerSourceRanges: []
        amqpsExternal:
            # amqpsExternal is used to enable or disable the TLS port on the external facing service.
