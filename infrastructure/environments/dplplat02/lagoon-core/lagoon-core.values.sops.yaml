        noderole.dplplatform: prod
    tolerations:
        - effect: NoSchedule
          key: noderole.dplplatform
          operator: Equal
          value: prod
    affinity:
        nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                    - matchExpressions:
