# * block Developers from SSH access to Lagoon environments; and
# * stop Developers from getting a redirect message when trying to SSH into the
#   ssh-token service.
# blockDeveloperSSH: false
# the following services are part of the lagoon-core chart
api:
  replicaCount: 2
  image:
    repository: uselagoon/api
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: true
    annotations:
      kubernetes.io/tls-acme: "true"
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - host: api.lagoon.dplplat02.dpl.reload.dk
        paths:
          - /
    tls:
      - secretName: api-tls
        hosts:
          - api.lagoon.dplplat02.dpl.reload.dk
  podAnnotations: {}
  securityContext: {}
  resources:
    limits:
      memory: 256Mi
      cpu: 500m
    requests:
      memory: 256Mi
      cpu: 500m
  additionalEnvs: null
  #   FOO: Bar
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
  nodeSelector:
    noderole.dplplatform: prod
  tolerations:
    - key: noderole.dplplatform
      operator: Equal
      value: prod
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: noderole.dplplatform
                operator: In
                values:
                  - prod
apiDB:
  image:
    repository: uselagoon/api-db
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
  service:
    type: ClusterIP
    port: 3306
  podAnnotations:
    appuio.ch/backupcommand: |
      /bin/sh -c "mysqldump --max-allowed-packet=500M --events --routines --quick --add-locks --no-autocommit --single-transaction --all-databases"
    backup.appuio.ch/file-extension: .api-db.sql
  securityContext: {}
  resources:
    requests:
      memory: 512Mi
      cpu: 500m
  additionalEnvs: null
  #   FOO: Bar
  storageSize: 128Gi
  terminationGracePeriodSeconds: 30
  startupProbe:
    # 60*10s period = 10 minutes
    failureThreshold: 60
    exec:
      command:
        - test
        - -f
        - /tmp/mariadb-init-complete
  livenessProbe:
    exec:
      command:
        - mysqladmin
        - --connect-timeout=4
        - ping
  readinessProbe:
    exec:
      command:
        - /usr/share/container-scripts/mysql/readiness-probe.sh
  nodeSelector:
    node-role.kubernetes.io/prod: ""
  tolerations:
    - key: noderole.dplplatform
      operator: Equal
      value: prod
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: noderole.dplplatform
                operator: In
                values:
                  - prod
