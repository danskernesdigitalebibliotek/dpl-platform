apiVersion: v1
data:
  meerkat-datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Meerkat API
        uid: meerkat-api
        type: yesoreyeram-infinity-datasource
        access: proxy
        url: http://meerkat-service.meerkat.svc:80
        editable: true
      - name: Meerkat Valkey
        uid: meerkat-valkey
        type: redis-datasource
        access: proxy
        orgId: 1
        isDefault: false
        version: 1
        url: redis://meerkat-valkey.meerkat.svc:6379
        jsonData:
          client: standalone
          poolSize: 5
          timeout: 10
          pingInterval: 0
          pipelineWindow: 0
        editable: true
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: meerkat
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: meerkat
    app.kubernetes.io/version: 1.0.15
    grafana_datasource: "1"
  name: meerkat-grafana-datasources
  namespace: monitoring
