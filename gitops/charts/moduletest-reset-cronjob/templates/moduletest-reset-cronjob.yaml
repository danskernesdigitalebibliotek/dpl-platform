# This manifest will fire up a customer Kubernetes Job in moduletest namepaces.
# It will synchronize all files as well as the database from the corresponding main environment to the moduletest environment

apiVersion: batch/v1
kind: CronJob
metadata:
  name: moduletest-reset
spec:
  schedule: "0 23 * * 3"  # This actually runs every other Wednesday at 23:00. Check jobTemplate.spec.template.spec.containers.command
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 50400 # 14 hours leaving time to investigate failed jobs
      backoffLimit: 3
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: moduletest-reset-container
              image: ghcr.io/danskernesdigitalebibliotek/dpl-platform/moduletest-reset-job:mr-2.0.0
              command:
                - /bin/bash
                - -c
                - "[[ $((date +%W % 2)) == 0 ]] && ./moduletest-reset.mjs --source {{ .Values.syncConfig.source }} --target {{ .Values.syncConfig.target }}"
              resources:
                requests:
                  memory: 256Mi
                  cpu: 250m
                limits:
                  memory: 512Mi
          serviceAccountName: moduletest-reset-serviceaccount
          tolerations:
            - key: noderole.dplplatform
              operator: Equal
              value: prod
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                    - key: noderole.dplplatform
                      operator: In
                      values:
                       - prod
---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: moduletest-reset-serviceaccount

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deployments-get-cluster-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: [ "pods", "pods/exec", "configmaps", "services" ]
  verbs: [ "get", "list", "create" ]
- apiGroups: [ "apps", "configmaps" ]
  resources: [ "deployments", "pods", "services" ]
  verbs: [ "get", "list" ]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: namespace-deployments-getter-binding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: moduletest-reset-serviceaccount
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: deployments-get-cluster-role
  apiGroup: rbac.authorization.k8s.io
